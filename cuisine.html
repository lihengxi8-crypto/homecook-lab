<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <script>(function(){try{var t=localStorage.getItem('hcl-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <title>菜系详情 | 家常菜实验室</title>
  <meta name="description" content="菜系详情页：在菜系地图的缩略简介之上，进一步细化每个菜系——地域细分、代表菜式、特色食材与风味蘸料，配手绘插图逐一展开。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%F0%9F%8D%B2%3C/text%3E%3C/svg%3E" />
</head>
<body data-page="cuisines">

  <header class="page-head" data-cuisine-head style="--accent:#4F8C86">
    <div class="container"></div>
  </header>

  <div class="container section-tight">
    <div class="doc-layout" data-doc-layout>
      <aside class="toc" data-toc></aside>
      <article class="prose" data-detail></article>
    </div>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
  (function () {
    const H = window.HCL || {};
    const CUS = H.cuisines || [];
    const DET = H.cuisineDetails || {};
    const BY = Object.fromEntries(CUS.map(c => [c.id, c]));
    const DISH = Object.fromEntries((H.dishes || []).map(d => [d.name, d.id]));

    // 六把尺子（与菜系地图一致，基础版「为什么这样」用得到）
    const LENS = {
      geo:  { emoji: '🌦️', label: '地理气候' },
      crop: { emoji: '🌾', label: '物产' },
      keep: { emoji: '🫙', label: '保存需求' },
      fire: { emoji: '🔥', label: '燃料灶具' },
      hist: { emoji: '🏛️', label: '历史经济' },
      move: { emoji: '🧭', label: '人口流动' },
    };

    const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    const headHost = document.querySelector('[data-cuisine-head] .container');
    const headEl = document.querySelector('[data-cuisine-head]');
    const host = document.querySelector('[data-detail]');
    const layout = document.querySelector('[data-doc-layout]');

    const id = (new URLSearchParams(location.search).get('id') || '').trim();
    const base = BY[id];
    const det = DET[id];

    /* ---------- 兜底：无 id / 未知 id → 列出全部菜系供选择 ---------- */
    if (!base) {
      headEl.style.setProperty('--accent', '#4F8C86');
      headHost.innerHTML = `
        <div class="crumbs"><a href="index.html">首页</a> / <a href="cuisines.html">菜系地图</a> / 菜系详情</div>
        <span class="num-chip">🗺️ 菜系详情</span>
        <h1>选择一个菜系</h1>
        <div class="en">Regional Cuisines · Detail</div>
        <p class="intro">点开任意菜系，看它的特点、代表菜与“为什么这样”；做了深度页的菜系还有地域细分、特色食材与风味蘸料。</p>`;
      layout.classList.add('no-toc');
      const cards = CUS.map(c => {
        const rich = !!DET[c.id];
        return `<a class="cd-pick" href="cuisine.html?id=${encodeURIComponent(c.id)}" style="--cu:${c.accent || 'var(--brick)'}">
          <span class="cd-pick-emoji">${c.emoji || '🍴'}</span>
          <span class="cd-pick-tx"><b>${esc(c.name)}</b><small>${esc(c.region || '')}</small></span>
          <span class="cd-pick-go">${rich ? '深入了解 →' : '查看 →'}</span>
        </a>`;
      }).join('');
      host.innerHTML = `<div class="cd-picker reveal">${cards}</div>`;
      if (window.setupReveal) window.setupReveal();
      return;
    }

    /* ---------- 头部 ---------- */
    const accent = base.accent || 'var(--brick)';
    headEl.style.setProperty('--accent', accent);
    document.title = `${base.name} · 菜系详情 | 家常菜实验室`;
    const lead = (det && det.lead) || (base.traits || []).join('、') || '';
    const metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.setAttribute('content',
      `${base.name}（${base.region || ''}）：${(det && det.lead) || (base.why || '').slice(0, 70)}`);

    const areaPills = ((det && det.areas) || []).map(a => `<span class="pill">${esc(a.name)}</span>`).join('');
    headHost.innerHTML = `
      <div class="crumbs"><a href="index.html">首页</a> / <a href="cuisines.html">菜系地图</a> / ${esc(base.name)}</div>
      <span class="num-chip">${base.emoji || '🍴'} ${esc(base.name)}</span>
      <h1>${esc(base.name)}</h1>
      <div class="en">${esc((det && det.en) || base.region || '')}</div>
      <p class="intro">${lead}</p>
      ${areaPills ? `<div class="tag-row">${areaPills}</div>` : ''}`;

    /* ---------- 共用渲染件 ---------- */
    // 媒体位：emoji 垫底，有图则用图覆盖；图加载失败自动退回 emoji
    const media = (item) => {
      const e = `<span class="cd-fig-emoji">${item.emoji || base.emoji || '🍴'}</span>`;
      const i = item.img
        ? `<img src="${esc(item.img)}" alt="${esc(item.name)}手绘插图" loading="lazy" width="800" height="600" onerror="this.remove()">`
        : '';
      return `<figure class="cd-fig">${e}${i}</figure>`;
    };
    // 代表菜命中案例菜库则做成深链（与菜系地图一致）
    const dishLink = (d) => {
      const did = DISH[d.name];
      const body = `${media(d)}<div class="cd-c-body"><h3>${esc(d.name)}</h3>${d.desc ? `<p>${esc(d.desc)}</p>` : ''}</div>`;
      return did
        ? `<a class="cd-card is-link" href="dishes.html#dish-${did}">${body}</a>`
        : `<div class="cd-card">${body}</div>`;
    };
    const ingCard = (it) => `<div class="cd-card">${media(it)}<div class="cd-c-body"><h3>${esc(it.name)}</h3>${it.desc ? `<p>${esc(it.desc)}</p>` : ''}</div></div>`;
    const areaCard = (a) => `<div class="cd-area"><div class="cd-a-top"><h3>${esc(a.name)}</h3>${a.tag ? `<span class="cd-tag">${esc(a.tag)}</span>` : ''}</div>${a.desc ? `<p>${esc(a.desc)}</p>` : ''}</div>`;
    const gallery = (items, fn) => `<div class="cd-gallery reveal" style="--cu:${accent}">${(items || []).map(fn).join('')}</div>`;
    // 分组：每组小标题 + 可选导语 + 图卡网格
    const groupBlocks = (groups, fn) => (groups || []).map(g => {
      let s = `<h3 class="cd-subhead">${esc(g.title)}</h3>`;
      if (g.lead) s += `<p class="cuisine-section-lead">${esc(g.lead)}</p>`;
      return s + gallery(g.items, fn);
    }).join('');

    let html = '';

    // hero 横幅（复用菜系地图的 .cuisine-hero）
    const hero = (det && det.hero) || `assets/img/cuisine/${base.id}.webp`;
    html += `<figure class="cuisine-hero reveal" style="--cu:${accent}">
      <img src="${esc(hero)}" alt="${esc(base.name)}代表菜手绘插图" onerror="this.closest('figure').remove()">
      ${det && det.heroCaption ? `<figcaption>${det.heroCaption}</figcaption>` : ''}
    </figure>`;

    // 特点（两种模式都展示，取自 base.traits）
    if ((base.traits || []).length) {
      html += `<div class="cd-traits-row reveal">${base.traits.map(t => `<span class="cd-trait">${esc(t)}</span>`).join('')}</div>`;
    }

    if (det) {
      /* ===== 丰富版 ===== */
      if ((det.story || []).length) {
        html += `<h2 data-toc="这一方水土"><span class="idx">🌏</span>这一方水土</h2>`;
        html += det.story.map(p => `<p>${p}</p>`).join('');
      }
      if ((det.areas || []).length) {
        html += `<h2 data-toc="地域细分"><span class="idx">📍</span>地域细分</h2>`;
        if (det.areasLead) html += `<p class="cuisine-section-lead">${det.areasLead}</p>`;
        html += `<div class="cd-areas reveal" style="--cu:${accent}">${det.areas.map(areaCard).join('')}</div>`;
      }
      // 代表菜式：优先分组，回退到平铺
      if ((det.dishGroups || []).length || (det.dishes || []).length) {
        html += `<h2 data-toc="代表菜式"><span class="idx">🍽️</span>代表菜式</h2>`;
        if (det.dishesLead) html += `<p class="cuisine-section-lead">${det.dishesLead}</p>`;
        html += (det.dishGroups || []).length ? groupBlocks(det.dishGroups, dishLink) : gallery(det.dishes, dishLink);
      }
      // 海鲜
      if ((det.seafood || []).length) {
        html += `<h2 data-toc="海鲜"><span class="idx">🌊</span>海鲜</h2>`;
        if (det.seafoodLead) html += `<p class="cuisine-section-lead">${det.seafoodLead}</p>`;
        html += gallery(det.seafood, ingCard);
      }
      // 特色食材：优先分组
      if ((det.ingredientGroups || []).length || (det.ingredients || []).length) {
        html += `<h2 data-toc="特色食材"><span class="idx">🧺</span>特色食材</h2>`;
        if (det.ingredientsLead) html += `<p class="cuisine-section-lead">${det.ingredientsLead}</p>`;
        html += (det.ingredientGroups || []).length ? groupBlocks(det.ingredientGroups, ingCard) : gallery(det.ingredients, ingCard);
      }
      // 风味与蘸料
      if (det.flavor) {
        html += `<h2 data-toc="风味与蘸料"><span class="idx">🥢</span>风味与蘸料</h2>`;
        if (det.flavor.intro) html += `<p>${det.flavor.intro}</p>`;
        if ((det.flavor.list || []).length)
          html += `<ul class="cd-flavor">${det.flavor.list.map(x => `<li>${x}</li>`).join('')}</ul>`;
      }
    } else {
      /* ===== 基础版（任意菜系自动生成） ===== */
      if ((base.dishes || []).length) {
        html += `<h2 data-toc="代表菜"><span class="idx">🍽️</span>代表菜</h2>`;
        html += `<div class="cu-dish-row" style="--cu:${accent}">${base.dishes.map(name => {
          const did = DISH[name];
          return did
            ? `<a class="cu-dish is-link" href="dishes.html#dish-${did}">${esc(name)}</a>`
            : `<span class="cu-dish">${esc(name)}</span>`;
        }).join('')}</div>`;
      }
      if (base.why) {
        html += `<h2 data-toc="为什么这样"><span class="idx">🧭</span>为什么这样</h2>`;
        const chips = (base.lenses || []).filter(k => LENS[k]).map(k =>
          `<span class="cu-lens" title="${esc(LENS[k].label)}">${LENS[k].emoji}<i>${esc(LENS[k].label)}</i></span>`).join('');
        if (chips) html += `<div class="cu-lens-row">${chips}</div>`;
        html += `<p>${base.why}</p>`;
      }
    }

    // 家常可借鉴（复用菜系地图里已有的 borrow，绿色可执行框）
    const borrow = (det && det.borrow) || base.borrow || [];
    if (borrow.length) {
      html += `<h2 data-toc="家常可借鉴"><span class="idx">🍳</span>家常可借鉴</h2>`;
      html += `<section class="cu-block cu-borrow" style="--cu:${accent}">
        <ul>${borrow.map(x => `<li>${esc(x)}</li>`).join('')}</ul>
      </section>`;
    }

    // 延伸 + 返回
    const see = (det && det.see) || base.see || [];
    const seeLinks = see.map(s => `<a href="${esc(s.href)}">${esc(s.t)}</a>`).join('');
    const moreNote = det ? '' : '<p class="cd-note-soft">这个菜系暂为缩略版，地域细分、特色食材等深度内容正在陆续补全。</p>';
    html += `<div class="note tip cd-foot">
      <span class="badge">→</span>
      <div>
        <h4>继续逛</h4>
        <p>想照着练，去 <a href="dishes.html">案例菜库</a>；想搞懂味型，看 <a href="sauces.html">调味与酱料</a>；火候门道在 <a href="techniques.html">火候与技法</a>。${seeLinks ? '相关篇章：' + seeLinks : ''}</p>
        ${moreNote}
        <p class="cd-back"><a href="cuisines.html">← 返回菜系地图</a></p>
      </div>
    </div>`;

    host.innerHTML = html;
    if (window.setupReveal) window.setupReveal();
  })();
  </script>
</body>
</html>
