<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <script>(function(){try{var t=localStorage.getItem('hcl-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <title>案例菜库 | 家常菜实验室</title>
  <meta name="description" content="经典家常菜案例库：每道菜标注用到的原理、预处理、技法与味型，并双向链接到对应篇章。学完原理，立刻看它怎么落地。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%F0%9F%8D%B2%3C/text%3E%3C/svg%3E" />
</head>
<body data-page="dishes">

  <header class="page-head" style="--accent:#C0492B">
    <div class="container">
      <div class="crumbs"><a href="index.html">首页</a> / 学以致用 / 案例菜库</div>
      <span class="num-chip">🍲 菜库</span>
      <h1>案例菜库</h1>
      <div class="en">Recipes · Principle-linked</div>
      <p class="intro">
        每道菜都拆成<strong>原理 / 预处理 / 技法 / 味型</strong>四类标签，点标签就能跳回对应篇章。
        这里不是菜谱大全，而是把“学到的原理”落到具体一锅菜的<strong>对照练习场</strong>。
      </p>
    </div>
  </header>

  <div class="container section-tight">
    <div class="filter-bar" data-filter aria-label="按技法筛选"></div>
    <div class="filter-bar filter-sub" data-filter-lv aria-label="按难度筛选"></div>
    <div class="dish-grid" data-dishes></div>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
  (function () {
    const D = window.HCL.dishes || [];
    const CREATORS = (window.HCL && window.HCL.creators) || [];
    const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    const PLAY = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>';

    // 技法归类（按特征技法落桶；优先级从上到下）
    function catOf(d) {
      const t = (d.tech || []).map(x => x[0]).join('');
      if (/凉拌/.test(t)) return '凉拌';
      if (/炸/.test(t)) return '油炸类';
      if (/蒸|汆|羹|浸|煮/.test(t)) return '蒸/煮';
      if (/烧|炖|焖|糖色|收汁/.test(t)) return '烧炖类';
      if (/炒|爆|煸|煎|熘/.test(t)) return '快炒类';
      return '其他';
    }
    const cats = ['全部', '快炒类', '烧炖类', '蒸/煮', '凉拌', '油炸类'];
    const levels = ['全部难度', '易', '中', '难'];

    const filterEl = document.querySelector('[data-filter]');
    const levelEl = document.querySelector('[data-filter-lv]');
    const gridEl = document.querySelector('[data-dishes]');
    let active = '全部';
    let activeLv = '全部难度';

    filterEl.innerHTML = cats.map((c, i) =>
      `<button class="chip${i === 0 ? ' active' : ''}" data-cat="${esc(c)}">${esc(c)}</button>`).join('');
    levelEl.innerHTML = levels.map((c, i) =>
      `<button class="chip lv-chip${i === 0 ? ' active' : ''}" data-lv="${esc(c)}">${esc(c)}</button>`).join('');

    function xref(arr) {
      return `<div class="xref">${(arr || []).map(([label, href]) =>
        `<a href="${esc(href)}">${esc(label)}</a>`).join('')}</div>`;
    }

    function skillsRow(d) {
      if (!d.skills || !d.skills.length) return '';
      return `<div class="dish-skills">${d.skills.map(s => `<span class="sk">${esc(s)}</span>`).join('')}</div>`;
    }

    const nameOf = id => { const c = CREATORS.find(x => x.id === id); return c ? c.name : ''; };

    // 演示视频：只渲染有 url 的深链；标注博主并链回博主库
    function refsRow(d) {
      const refs = (d.refs || []).filter(r => r && r.url);
      if (!refs.length) return '';
      return `<div class="dish-refs">
        <span class="dr-k">${PLAY} 演示视频</span>
        <div class="dr-list">${refs.map(r => {
          const cname = nameOf(r.creator);
          const label = r.title || cname || '观看视频';
          const by = cname ? ` <a class="dr-by" href="creators.html#creator-${esc(r.creator)}">@${esc(cname)}</a>` : '';
          return `<span class="dr-item"><a class="dr-link" href="${esc(r.url)}" target="_blank" rel="noopener noreferrer">${esc(label)} ↗</a>${by}</span>`;
        }).join('')}</div>
      </div>`;
    }

    function render() {
      const list = D.filter(d =>
        (active === '全部' || catOf(d) === active) &&
        (activeLv === '全部难度' || d.level === activeLv));
      gridEl.innerHTML = list.length ? list.map(d => `
        <article class="card dish-card reveal" id="dish-${esc(d.id)}">
          <div class="dh">
            <span class="demoji">${esc(d.emoji)}</span>
            <h3>${esc(d.name)}</h3>
            <span class="lvl ${esc(d.level)}">${esc(d.level)}</span>
          </div>
          <p class="dsum">${esc(d.summary)}</p>
          ${skillsRow(d)}
          <div class="dish-meta">
            <div class="row"><span class="k">原理</span>${xref(d.principles)}</div>
            <div class="row"><span class="k">预处理</span>${xref(d.prep)}</div>
            <div class="row"><span class="k">技法</span>${xref(d.tech)}</div>
            <div class="row"><span class="k">味型</span>${xref(d.taste)}</div>
          </div>
          ${refsRow(d)}
          <details>
            <summary>查看做法（${(d.steps || []).length} 步）</summary>
            <ol>${(d.steps || []).map(s => `<li>${esc(s)}</li>`).join('')}</ol>
          </details>
        </article>`).join('') : '<p class="empty-hint">没有符合条件的菜，换个筛选试试。</p>';
      if (window.setupReveal) window.setupReveal();
      const hash = location.hash;
      if (hash) { const t = document.querySelector(hash); if (t) { t.scrollIntoView({ behavior: 'smooth', block: 'center' }); t.querySelector('details')?.setAttribute('open', ''); } }
    }

    filterEl.addEventListener('click', e => {
      const b = e.target.closest('.chip'); if (!b) return;
      active = b.dataset.cat;
      filterEl.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === b));
      render();
    });
    levelEl.addEventListener('click', e => {
      const b = e.target.closest('.chip'); if (!b) return;
      activeLv = b.dataset.lv;
      levelEl.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === b));
      render();
    });
    render();
  })();
  </script>
</body>
</html>
